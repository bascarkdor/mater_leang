{% extends 'layout/layout.html' %}

{% block title %} Contact Us - FlaskShop {% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6 animate-fade-in">

    <div class="text-center space-y-2 px-4">
        <h1 class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight">
            Contact Us
        </h1>
        <p class="text-sm md:text-base text-gray-500 max-w-md mx-auto">
            Have a question about your order or our products? Drop us a message and our team will get right back to you.
        </p>
    </div>

    <form action="/contact/send" method="POST" class="bg-white border border-gray-200 p-5 md:p-8 rounded-2xl shadow-sm space-y-4">
        
        <div class="space-y-1.5">
            <label for="name" class="text-xs font-bold text-gray-700 uppercase tracking-wider">Full Name</label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="John Doe"
                required
                class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 p-3.5 outline-none transition placeholder:text-gray-400">
        </div>

        <div class="space-y-1.5">
            <label for="email" class="text-xs font-bold text-gray-700 uppercase tracking-wider">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="johndoe@example.com"
                required
                class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 p-3.5 outline-none transition placeholder:text-gray-400">
        </div>

        <div class="space-y-1.5">
            <label for="message" class="text-xs font-bold text-gray-700 uppercase tracking-wider">Your Message</label>
            <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="How can we help you?"
                required
                class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 p-3.5 outline-none transition placeholder:text-gray-400 resize-none"></textarea>
        </div>

        <div class="pt-2">
            <button
                type="submit"
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3.5 rounded-xl text-sm shadow-md transition active:scale-[0.98] cursor-pointer text-center">
                Send Message
            </button>
        </div>

    </form>
</div>
{% endblock %}
