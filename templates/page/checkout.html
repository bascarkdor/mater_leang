{% extends 'layout/layout.html' %}

{% block title %} Checkout - FlaskShop {% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-6 md:py-12">
    <div class="container mx-auto px-4 sm:px-6 max-w-2xl space-y-6 template-fade-in">

        <h1 class="text-2xl sm:text-3xl md:text-4xl font-black text-gray-900 flex items-center tracking-tight px-1">
            Secure Checkout
        </h1>

        <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-6 md:p-8">
            <h2 class="text-lg font-bold text-gray-800 mb-6">Delivery Details & Information</h2>

            <form action="/submit-order" method="POST" class="space-y-5">

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Username / Full Name</label>
                        <input type="text" name="username" required placeholder="John Doe"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Age</label>
                        <input type="number" name="age" required placeholder="25" min="1"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Phone Number</label>
                    <input type="tel" name="phone" required placeholder="+1 (555) 000-0000"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">General Location (City / State)</label>
                    <input type="text" name="location" required placeholder="Los Angeles, CA"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Full Delivery Address</label>
                    <textarea name="address" required rows="4" placeholder="Street Address, Apartment, Suite, Zip Code..."
                              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition resize-none"></textarea>
                </div>

                <div class="bg-gray-50 rounded-xl p-4 flex justify-between items-center border border-gray-100">
                    <span class="text-sm font-bold text-gray-500 uppercase tracking-wider">Total Due Amount:</span>
                    <span class="text-xl font-black text-gray-900">${{ "%.2f"|format(total) }}</span>
                </div>

                <div class="pt-2 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <a href="/cart" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition">
                        &larr; Return to Cart
                    </a>
                    <button type="submit"
                            class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl transition duration-200 shadow-md active:scale-[0.98] cursor-pointer text-sm text-center">
                        Confirm & Place Order
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
