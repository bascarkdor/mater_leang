{% extends 'layout/auth_layout.html' %}

{% block title %}Register - My Flask Store{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-xl shadow-lg w-full">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-900">Register</h2>

    <form action="/register" method="POST" class="space-y-4">
        <div>
            <input
                type="text"
                name="fullname"
                placeholder="Full Name"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div>
            <input
                type="text"
                name="username"
                placeholder="Username"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div>
            <input
                type="email"
                name="email"
                placeholder="Email"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div>
            <input
                type="password"
                name="password"
                placeholder="Password"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div>
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition cursor-pointer">
            Register
        </button>

        <a href="{{ url_for('home') }}" class="w-full">
            <button type="button"
                class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition active:scale-[0.98] cursor-pointer text-center">
                Cancel
            </button>
        </a>
    </form>

    <p class="text-center mt-6 text-sm text-gray-600">
        Already have an account?
        <a href="/login" class="text-blue-600 hover:underline font-medium">
            Login
        </a>
    </p>
</div>
{% endblock %}
