{% extends 'layout/auth_layout.html' %}

{% block title %}Login - My Flask Store{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-xl shadow-lg w-full">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-900">Login</h2>

    <form action="/login" method="POST" class="space-y-4">
        <div>
            <input
                type="text"
                name="username"
                placeholder="Username or Email"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div>
            <input
                type="password"
                name="password"
                placeholder="Password"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center text-gray-600">
                <input type="checkbox" name="remember" class="mr-2 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                Remember me
            </label>
            <a href="#" class="text-blue-600 hover:underline font-medium">Forgot password?</a>
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition cursor-pointer mt-2">
            Login
        </button>

        <a href="{{ url_for('home') }}" class="w-full">
            <button type="button"
                class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition active:scale-[0.98] cursor-pointer text-center">
                Cancel
            </button>
        </a>
    </form>

    <p class="text-center mt-6 text-sm text-gray-600">
        Don't have an account? 
        <a href="/register" class="text-blue-600 hover:underline font-medium">
            Register
        </a>
    </p>
</div>
{% endblock %}
